[project]
name = "django-bapp-connectors"
version = "0.13.0"
description = "Django integration for bapp-connectors: multi-tenant connection management, sync state, webhooks, and audit logging"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "django>=4.2",
    "bapp-connectors",
    "cryptography>=41.0",
]

[project.optional-dependencies]
celery = ["celery>=5.0"]
dev = [
    "pytest>=7.0",
    "pytest-django>=4.5",
    "pytest-cov>=4.0",
    "ruff>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/django_bapp_connectors"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]
DJANGO_SETTINGS_MODULE = "tests.settings"

[tool.uv.sources]
bapp-connectors = { workspace = true }
