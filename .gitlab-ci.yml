stages:
  - test
  - publish
  - sync

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.uv-cache"

# ── Unit Tests + Lint ──────────────────────────────────────────────────────

test:
  stage: test
  image: "python:3.13-bookworm"
  interruptible: true
  cache:
    key: "uv-${CI_COMMIT_REF_SLUG}"
    paths:
      - .uv-cache
      - .venv
  before_script:
    - pip install uv --quiet
    - uv sync --extra dev --extra sftp --extra s3
  script:
    - uv run pytest tests/ -v --tb=short
    - uv run ruff check src/
  rules:
    - if: '$CI_COMMIT_TAG || $CI_COMMIT_BRANCH'

# ── Publish Package ────────────────────────────────────────────────────────

publish:
  stage: publish
  image: "python:3.13-bookworm"
  needs:
    - test
  before_script:
    - pip install uv --quiet
    - uv build
  script:
    - |
      uv publish \
        --publish-url "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi" \
        --username gitlab-ci-token \
        --password "$CI_JOB_TOKEN"
  rules:
    - if: '$CI_COMMIT_TAG'

# ── Sync to GitHub ────────────────────────────────────────────────────────

sync-github:
  stage: sync
  image: alpine:3.20
  before_script:
    - apk add --no-cache git openssh-client
    - mkdir -p ~/.ssh
    - echo "$GITHUB_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan github.com >> ~/.ssh/known_hosts
    - git config --global user.name "bapp-open-bot"
    - git config --global user.email "bot@bapp.ro"
  script:
    - git clone --bare "$CI_REPOSITORY_URL" repo.git
    - cd repo.git
    - git push --mirror git@github.com:bapp-open/bapp-connectors.git
  rules:
    - if: '$CI_COMMIT_TAG || $CI_COMMIT_BRANCH == "main"'
